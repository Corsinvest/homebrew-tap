name: Update Formulae Table

on:
  push:
    paths:
      - 'Formula/**.rb'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Formulae table and update README
        run: |
          python3 << 'PYEOF'
          import re, os, glob

          rows = []
          for rb in sorted(glob.glob("Formula/*.rb")):
              name = os.path.basename(rb).replace(".rb", "")
              content = open(rb).read()
              desc    = re.search(r'^\s*desc\s+"(.+?)"', content, re.M)
              homepage= re.search(r'^\s*homepage\s+"(.+?)"', content, re.M)
              version = re.search(r'^\s*version\s+"(.+?)"', content, re.M)
              desc    = desc.group(1)    if desc    else ""
              homepage= homepage.group(1)if homepage else ""
              version = version.group(1) if version else ""
              rows.append(f"| [{name}]({homepage}) | `{name}` | {version} | {desc} |")

          table = "\n".join([
              "<!-- FORMULAE -->",
              "| Repository | Formula | Version | Description |",
              "| ---------- | ------- | ------- | ----------- |",
              *rows,
              "<!-- /FORMULAE -->",
          ])

          readme = open("README.md").read()
          updated = re.sub(r"<!-- FORMULAE -->.*?<!-- /FORMULAE -->", table, readme, flags=re.DOTALL)
          open("README.md", "w").write(updated)
          print("Table updated.")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "docs: update Formulae table" && git push)

